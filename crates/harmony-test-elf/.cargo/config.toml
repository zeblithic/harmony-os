# Use rust-lld for cross-linking to aarch64-unknown-linux-musl from macOS.
# No external cross-compiler toolchain required.
# -C link-self-contained=no: skip musl's crt1.o (we provide our own _start).
[target.aarch64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "linker-flavor=ld.lld", "-C", "link-self-contained=no"]
