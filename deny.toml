# cargo-deny configuration for harmony-os
# Run: cargo deny check

[advisories]
ignore = [
    # paste is unmaintained (RUSTSEC-2024-0436) but has no replacement yet;
    # it's a transitive dep via defmt-macros. Revisit when defmt drops it.
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
# keccak 0.2.0 (stable) removed KeccakP1600 which sha3 0.11.0-rc.8
# requires (transitive dep via ml-dsa/ml-kem in harmony core).
# Only keccak 0.2.0-rc.2 works. The Cargo.lock pins this, but
# cargo-deny provides a second safety net against accidental
# `cargo update` breakage.
deny = [
    { crate = "keccak@=0.2.0", reason = "keccak 0.2.0 removed KeccakP1600; only 0.2.0-rc.2 works with sha3 0.11.0-rc.8" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "GPL-2.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
[sources.allow-org]
github = ["zeblithic"]
