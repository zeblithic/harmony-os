name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b  # v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Cache cargo artifacts across runs.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: nix develop --command cargo fmt --all -- --check

      - name: Clippy
        run: nix develop --command cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Clippy (xtask)
        run: nix develop --command cargo clippy --manifest-path xtask/Cargo.toml -- -D warnings

      - name: Tests
        run: nix develop --command cargo test --locked --workspace

      - name: cargo-deny
        run: nix develop --command cargo deny check

  qemu-smoke:
    name: QEMU Boot Tests
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b  # v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Cache cargo artifacts — includes bare-metal build outputs.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            crates/harmony-boot/target
            crates/harmony-boot-aarch64/target
            crates/harmony-test-elf/target
            xtask/target
          key: ${{ runner.os }}-cargo-qemu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qemu-
            ${{ runner.os }}-cargo-

      - name: Boot x86_64 + aarch64 in QEMU
        run: |
          set -o pipefail
          mkdir -p qemu-logs
          nix develop --command cargo xtask qemu-test 2>&1 | tee qemu-logs/qemu-test.log

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: qemu-serial-logs
          path: qemu-logs/
          if-no-files-found: ignore
